# CI workflow template — bootstrapped via NEX Studio Create Project K-005.
#
# Default 3-job pipeline: lint + test + build. Adjust per-project as needed.
# Triggers on push to main + pull_request to main.
#
# Per F-004 K-005 spec §3.5 — copied to new project as
# `.github/workflows/ci.yml` when "Enable CI/CD" checkbox is selected.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # CR-030: manual dispatch pre stuck-run recovery

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install poetry
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: pip install --no-cache-dir poetry==1.8.5

      - name: Install backend deps
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: |
          cd backend
          poetry install --no-interaction --no-root

      - name: Ruff check (backend)
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: cd backend && poetry run ruff check .

      - name: Ruff format check (backend)
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: cd backend && poetry run ruff format --check .

      - name: Set up Node.js
        if: ${{ hashFiles('frontend/package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        if: ${{ hashFiles('frontend/package.json') != '' }}
        run: cd frontend && npm ci

      - name: Frontend type-check + lint
        if: ${{ hashFiles('frontend/package.json') != '' }}
        run: |
          cd frontend
          npm run type-check
          npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install poetry
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: pip install --no-cache-dir poetry==1.8.5

      - name: Install backend deps
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: |
          cd backend
          poetry install --no-interaction --no-root

      - name: Backend pytest
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: cd backend && poetry run pytest -q

      - name: Set up Node.js
        if: ${{ hashFiles('frontend/package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        if: ${{ hashFiles('frontend/package.json') != '' }}
        run: cd frontend && npm ci

      - name: Frontend vitest
        if: ${{ hashFiles('frontend/package.json') != '' }}
        run: cd frontend && npm test -- --run

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Docker compose build
        if: ${{ hashFiles('docker-compose.yml') != '' }}
        run: docker compose build
