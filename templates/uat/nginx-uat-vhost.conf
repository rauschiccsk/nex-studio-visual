# NGINX reverse proxy for UAT — per F-003 §10 + CR-022 amendment.
#
# Renderovaný cez scripts/_uat_lib.render_template("uat/nginx-uat-vhost.conf", ...)
# s placeholdermi:
#   SLUG              — UAT slug
#   UAT_PORT          — frontend host port (127.0.0.1:UAT_PORT — frontend HTTP)
#   BACKEND_HOST_PORT — backend host port (127.0.0.1:BACKEND_HOST_PORT — backend HTTP, per CR-022 §C-6)
#
# Output zapísaný do /opt/uat/<slug>/nginx-uat-vhost.conf (user-writable).
# Aktivácia: sudo cp do /etc/nginx/sites-available/ + symlink + sudo nginx -t
# + sudo systemctl reload nginx (manual Direktor — žiadny sudo v Implementer scope).
#
# Cert: wildcard *.isnex.eu (Let's Encrypt, per ICC_STANDARDS).
# Network isolation: prístupné iba cez Tailscale/RDP/intranet (per F-003 §10).

server {
    listen 443 ssl http2;
    server_name uat-{{ SLUG }}.isnex.eu;

    ssl_certificate     /etc/letsencrypt/live/isnex.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/isnex.eu/privkey.pem;

    # Logs (UAT-specific access + error logs)
    access_log /var/log/nginx/uat-{{ SLUG }}-access.log;
    error_log  /var/log/nginx/uat-{{ SLUG }}-error.log;

    # Backend API (CR-022 §C-6)
    location /api/ {
        proxy_pass         http://127.0.0.1:{{ BACKEND_HOST_PORT | default(UAT_PORT | int + 100) }};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health endpoint (CR-022 §C-6 — direct backend access cez NGINX pre external monitoring)
    location /health {
        proxy_pass         http://127.0.0.1:{{ BACKEND_HOST_PORT | default(UAT_PORT | int + 100) }}/health;
        proxy_set_header   Host              $host;
        access_log         off;
    }

    # Frontend (Vite static bundle / nginx container) — default location, MUST be last
    location / {
        proxy_pass         http://127.0.0.1:{{ UAT_PORT }};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Reasonable upload limit (per Sub-round 4 — file uploads pre PDF testy môžu byť big)
    client_max_body_size 50M;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name uat-{{ SLUG }}.isnex.eu;
    return 301 https://$server_name$request_uri;
}
