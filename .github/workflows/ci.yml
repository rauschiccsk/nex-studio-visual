name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # CR-030: manual dispatch pre stuck-run recovery

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  test:
    name: Test
    # Self-hosted: the create-project / set-module-status integration tests write live KB
    # documents under /home/icc (the ANDROS KB), unavailable on ubuntu-latest. (Unrelated to
    # nex-shared/host-build — a future improvement is a configurable KB root so tests are hermetic.)
    runs-on: self-hosted
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexstudiovisual
          POSTGRES_PASSWORD: nexstudiovisual
          POSTGRES_DB: nexstudiovisual
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexstudiovisual -d nexstudiovisual"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Create test database
        run: |
          poetry run python -c "
          import pg8000
          conn = pg8000.connect(host='localhost', port=5432, user='nexstudiovisual', password='nexstudiovisual', database='nexstudiovisual')
          conn.autocommit = True
          conn.run('CREATE DATABASE nexstudiovisual_test OWNER nexstudiovisual')
          conn.close()
          "

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql+pg8000://nexstudiovisual:nexstudiovisual@localhost:5432/nexstudiovisual"
        run: poetry run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+pg8000://nexstudiovisual:nexstudiovisual@localhost:5432/nexstudiovisual"
          TEST_DATABASE_URL: "postgresql+pg8000://nexstudiovisual:nexstudiovisual@localhost:5432/nexstudiovisual_test"
          SECRET_KEY: "ci-test-secret-key"
          BACKEND_PORT: "9176"
          FRONTEND_PORT: "9177"
        run: poetry run pytest --tb=short -q

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -b --noEmit 2>/dev/null || npx tsc -b

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
          VITE_APP_VERSION: "0.1.${{ github.run_number }}"
        run: npm run build

  contract:
    name: Contract Drift-Gate
    # v0.7.0 R2-c: the BE↔FE contract single-source-of-truth gate. Regenerates the FE pipeline
    # types from the backend OpenAPI schema and fails if the committed copy is stale (someone
    # changed a BE schema without `npm run codegen`). Hermetic — no DB / no /home/icc KB — so it
    # runs on ubuntu-latest (reliable npm + pip), unlike the self-hosted `test` job.
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Regenerate FE contract types
        working-directory: frontend
        # `npm run codegen` dumps the OpenAPI schema (poetry → backend.scripts.dump_openapi) and
        # runs openapi-typescript → src/services/api/pipeline.generated.ts.
        run: npm run codegen

      - name: Fail on contract drift
        run: |
          git diff --exit-code frontend/src/services/api/pipeline.generated.ts \
            || { echo "::error::pipeline.generated.ts is stale — run 'npm run codegen' in frontend/ and commit the result."; exit 1; }

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, build-frontend, contract]
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t nex-studio-visual-backend:ci-${{ github.sha }} .

      # nex-shared is PUBLIC → the frontend builds IN-CONTAINER (multi-stage Dockerfile).
      - name: Build frontend image
        run: docker build -t nex-studio-visual-frontend:ci-${{ github.sha }} frontend/

      - name: Verify images
        run: |
          docker image inspect nex-studio-visual-backend:ci-${{ github.sha }} > /dev/null
          docker image inspect nex-studio-visual-frontend:ci-${{ github.sha }} > /dev/null

      - name: Clean up CI images
        if: always()
        run: |
          docker rmi nex-studio-visual-backend:ci-${{ github.sha }} || true
          docker rmi nex-studio-visual-frontend:ci-${{ github.sha }} || true

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build
    # DISABLED 2026-06-25 (Director): auto-deploy-on-push redeployed NEX Studio from main via the
    # base compose on every push → reverted manual PROD v1.0.0 pins. Deploys are now CONTROLLED
    # (manual `docker compose`, like the apps) to keep PROD v1.0.0 stable while v2.0.0 is developed.
    # The proper tag-based prod/dev/UAT deploy is part of the v2.0.0 deploy redesign — re-enable then.
    if: false  # was: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Deploy with Docker Compose
        working-directory: /opt/projects/nex-studio-visual
        env:
          VITE_APP_VERSION: "0.1.${{ github.run_number }}"
        run: |
          git pull origin main --ff-only
          # nex-shared is PUBLIC → `docker compose build` builds the SPA in-container
          # (multi-stage Dockerfile); VITE_APP_VERSION flows via the compose build-arg.
          docker compose down --remove-orphans || true
          docker compose pull db
          docker compose build backend frontend
          docker compose up -d --force-recreate
          sleep 5

      - name: Health check
        working-directory: /opt/projects/nex-studio-visual
        run: |
          python -m backend.scripts.healthcheck || echo "Health check pending — backend may still be starting"
