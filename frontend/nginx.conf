server {
    listen 9177;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Basic security headers (HSTS is intentionally omitted — TLS is terminated upstream).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API requests to the FastAPI backend service (docker-compose network).
    location /api/ {
        proxy_pass http://backend:9176;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow SSE / long-lived streams used by delegation and architect.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Liveness probe for the frontend container.
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"frontend"}';
    }

    # Long-cache immutable static assets produced by Vite (hashed filenames).
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unknown routes resolve to index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }
}
