services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexstudio
      POSTGRES_PASSWORD: nexstudio
      POSTGRES_DB: nexstudio
    ports:
      - "9178:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexstudio -d nexstudio"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "9176:9176"
    volumes:
      - /home/andros/.claude:/home/andros/.claude
      # rw — backend writes per-project live documents
      # (STATUS.md / HISTORY.md / ARCHITECT.md) under projects/{slug}/.
      # See docs/architect/live-docs-port.md §3.
      - /home/icc/knowledge:/home/icc/knowledge:rw
      - uploads:/app/uploads
    environment:
      DATABASE_URL: "postgresql+pg8000://nexstudio:nexstudio@db:5432/nexstudio"
      TEST_DATABASE_URL: "postgresql+pg8000://nexstudio:nexstudio@db:5432/nexstudio_test"
      SECRET_KEY: "change-me-in-production"
      BACKEND_PORT: "9176"
      FRONTEND_PORT: "9177"
      VITE_API_BASE_URL: "http://localhost:9176"
      CLAUDE_CONFIG_DIR: "/home/andros/.claude"
      CLAUDE_CLI_PATH: "claude"
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
      # GitHub PAT used by create_github_repo to provision the project
      # repository under rauschiccsk on POST /api/v1/projects.
      # Scope required: admin:org (create repo under an organisation)
      # + repo (manage repo metadata). Set in /opt/nex-studio-src/.env.
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      # Mockup server runs with network_mode: host so the backend
      # (bridged) reaches it via host-gateway — extra_hosts below
      # wires the Docker-standard name on Linux.
      MOCKUP_ADMIN_URL: "http://host.docker.internal:9190"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9176/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_APP_VERSION: "${VITE_APP_VERSION:-dev}"
    restart: unless-stopped
    ports:
      - "9177:9177"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9177/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Dedicated per-project mockup listener. Runs on the host network so
  # every project's ``ui_design_port`` (e.g. 10103 for nex-test) lands
  # directly on the host without forwarding a 5000-port range. The
  # admin channel runs on ``MOCKUP_ADMIN_PORT`` (default 9190) and
  # receives POST /admin/reload/{project_id} from the backend after
  # every ``html_preview`` write.
  mockup:
    build:
      context: .
      dockerfile: mockup_server/Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: "postgresql+pg8000://nexstudio:nexstudio@localhost:9178/nexstudio"
      MOCKUP_ADMIN_PORT: "9190"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
