# Explicit project name — survives symlinks and cwd-based derivation.
# Was implicit `nex-studio-src` (from old /opt/nex-studio-src dir).
# Migrated 2026-05-03 per STRUCTURE.md to /opt/projects/nex-studio.
name: nex-studio

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexstudio
      POSTGRES_PASSWORD: nexstudio
      POSTGRES_DB: nexstudio
    ports:
      - "9178:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexstudio -d nexstudio"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "9176:9176"
    volumes:
      - /home/andros/.claude:/home/andros/.claude
      # rw — backend writes per-project live documents
      # (STATUS.md / HISTORY.md / ARCHITECT.md) under projects/{slug}/.
      # See docs/architect/live-docs-port.md §3.
      - /home/icc/knowledge:/home/icc/knowledge:rw
      # rw — backend bootstraps new projects into /opt/projects/<slug>/
      # via subprocess invocation of icc-claude-template/init.sh on
      # POST /api/v1/projects. Required write access for mkdir + git init
      # + template file copy. Per icc/STRUCTURE.md.
      - /opt/projects:/opt/projects:rw
      # rw — backend manages credentials files (CRUD) here. Per
      # CLAUDE.md §13 + 2026-05-04 design: credentials live OUTSIDE
      # /home/icc/knowledge/ so no RAG indexer / kb_sync can pick them
      # up. ri-gated REST API at /api/v1/credentials is the only way in.
      - /opt/data/nex-studio/credentials:/opt/data/nex-studio/credentials:rw
      - uploads:/app/uploads
      # rw — durable PTY output logs per agent terminal session.
      # Survives BE container restart so the visual scrollback is
      # preserved + ``claude --resume <uuid>`` can continue AI memory.
      # Director directive 2026-05-19. Retention: 30 days, rotation
      # at 100 MB/file (in-place truncate of older half).
      - terminal_logs:/var/lib/nex-studio/terminal-logs
      # ro — Docker socket bind mount so AG agents inside the BE
      # container can drive the host Docker daemon (testcontainers
      # integration tests per L-012, Stalwart Mail server for IMAP
      # tests, etc). Director directive 2026-05-19 voľba A.
      # SECURITY: socket access = effective root on host. Acceptable
      # for ICC internal dev (single trusted Director); never enable
      # if NEX Studio is exposed to untrusted users. See backend/
      # Dockerfile comment on the matching docker group (GID 110).
      - /var/run/docker.sock:/var/run/docker.sock
      # rw — backend orchestrates UAT deploys cez Implementer agents.
      # Required pre cross-project `docker compose build/up` v UAT
      # compose files (per CR-NS-002 Director directive 2026-06-01).
      # SECURITY: same as /var/run/docker.sock — effective root on host.
      # Acceptable for ICC internal dev (single trusted Director).
      - /opt/uat:/opt/uat:rw
      # ro — shared ICC infra. Agent Telegram-notify bot token lives at
      # /opt/infra/telegram/icc-agents.env (CR-NS-011). Read-only; the secret
      # file is owned by andros (uid 1000 = container user) so notify can read it.
      - /opt/infra:/opt/infra:ro
    environment:
      DATABASE_URL: "postgresql+pg8000://nexstudio:nexstudio@db:5432/nexstudio"
      TEST_DATABASE_URL: "postgresql+pg8000://nexstudio:nexstudio@db:5432/nexstudio_test"
      SECRET_KEY: "change-me-in-production"
      BACKEND_PORT: "9176"
      FRONTEND_PORT: "9177"
      VITE_API_BASE_URL: "http://localhost:9176"
      CLAUDE_CONFIG_DIR: "/home/andros/.claude"
      CLAUDE_CLI_PATH: "claude"
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
      # Pin claude CLI to the version baked into the Docker image
      # (RUN npm install -g @anthropic-ai/claude-code). The container
      # runs as non-root andros (uid 1000) so the in-process auto-update
      # path (``npm i -g``) cannot write to /usr/local — it fails noisily
      # on every spawn. Disabling the updater silences both "Auto-update
      # failed" and the follow-up "Native installation exists but
      # ~/.local/bin is not in your PATH" warning that derives from the
      # updater scanning the mounted ~/.claude state for installed
      # binaries on the host. Updates happen at Docker image rebuild.
      DISABLE_AUTOUPDATER: "1"
      # GitHub PAT used by create_github_repo to provision the project
      # repository under rauschiccsk on POST /api/v1/projects.
      # Scope required: admin:org (create repo under an organisation)
      # + repo (manage repo metadata). Set in /opt/projects/nex-studio/.env.
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      # gh CLI authentication — used by Implementer (AgentTerminal subprocess)
      # for `gh run watch`, `gh api`, etc. per charter §15.3 CI monitor.
      # Same PAT as GITHUB_TOKEN typically; gh CLI prefers GH_TOKEN env name.
      # Per CR-NS-002 Director directive 2026-06-01.
      GH_TOKEN: "${GH_TOKEN:-}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9176/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_APP_VERSION: "${VITE_APP_VERSION:-dev}"
    restart: unless-stopped
    ports:
      - "9177:9177"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9177/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  uploads:
  terminal_logs:
